name: Setup build environment
description: 'Sets up JDK, Gradle, and Node.js for building and publishing the kmp-logger module.'
runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
