name: Snapshot

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Maven (Android, JVM, JS, KMP metadata) + npm — fast ubuntu runner.
  publish-non-ios:
    name: Publish non-iOS snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
      - uses: ./.github/actions/publish-module
        with:
          is-release: 'false'
          publish-metadata: 'true'
          publish-jvm: 'true'
          publish-android: 'true'
          publish-js-maven: 'true'
          publish-npm: 'true'
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

  # iOS klib artifacts — macOS runner required.
  publish-ios:
    name: Publish iOS snapshot
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
      - uses: ./.github/actions/publish-module
        with:
          is-release: 'false'
          publish-ios: 'true'
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
