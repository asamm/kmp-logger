name: Release

on:
  push:
    tags:
      - "v[0-9]*"

# Prevent two concurrent release publishes from racing on the same tag. Not cancelled —
# let an in-progress publish finish before the next one starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Maven (Android, JVM, JS, KMP metadata) + npm — fast ubuntu runner.
  publish-non-ios:
    name: Publish non-iOS artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
      - uses: ./.github/actions/publish-module
        with:
          is-release: 'true'
          publish-metadata: 'true'
          publish-jvm: 'true'
          publish-android: 'true'
          publish-js-maven: 'true'
          publish-npm: 'true'
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

  # iOS klib artifacts — macOS runner is mandatory (Apple SDK + Kotlin/Native toolchain).
  publish-ios:
    name: Publish iOS artifacts
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
      - uses: ./.github/actions/publish-module
        with:
          is-release: 'true'
          publish-ios: 'true'
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

  # GitHub Release — only after all artifacts are up.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-non-ios, publish-ios]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
